        size: [16, 12, 0.4]
        z_range_m: [28.8, 29.2]
        surface_z_m: 28.8
        floor_id: "podium_roof"
        building_id: "central_podium"
        level_index: 8
        zone_role: "unloading_platform"
        hook_target_offset_m: 0.5
        approach_clearance_m: 4
        accepted_load_types: ["rebar_bundle", "formwork_panel", "mep_box"]
      - zone_id: "north_tower_floor_20"
        type: "box"
        center: [0, 70, 72.0]
        size: [12, 10, 0.4]
        z_range_m: [72.0, 72.4]
        surface_z_m: 72.0
        floor_id: "floor_20"
        building_id: "north_tower"
        level_index: 20
        zone_role: "floor_slab"
        hook_target_offset_m: 0.5
        approach_clearance_m: 4
        accepted_load_types: ["rebar_bundle", "mep_box"]
      - zone_id: "north_tower_roof"
        type: "box"
        center: [8, 82, 93.6]
        size: [12, 10, 0.4]
        z_range_m: [93.6, 94.0]
        surface_z_m: 93.6
        floor_id: "roof"
        building_id: "north_tower"
        level_index: 26
        zone_role: "roof"
        hook_target_offset_m: 0.5
        approach_clearance_m: 4
        accepted_load_types: ["mep_box"]
      - zone_id: "central_podium_roof"
        type: "box"
        center: [18, 20, 28.8]
        size: [14, 10, 0.4]
        z_range_m: [28.8, 29.2]
        surface_z_m: 28.8
        floor_id: "podium_roof"
        building_id: "central_podium"
        level_index: 8
        zone_role: "roof"
        hook_target_offset_m: 0.5
        approach_clearance_m: 4
        accepted_load_types: ["formwork_panel", "rebar_bundle"]
    forbidden_zone_policy:
      mode: "task_only"
      record_violation: true

  load_types:
    rebar_bundle:
      display_name: "Rebar bundle"
      weight_range_t: [1.2, 2.0]
      size_m: [5.0, 0.8, 0.8]
      shape: "box_long"
    formwork_panel:
      display_name: "Formwork panel"
      weight_range_t: [0.8, 1.5]
      size_m: [3.0, 1.6, 0.4]
      shape: "panel"
    mep_box:
      display_name: "MEP equipment box"
      weight_range_t: [0.6, 1.2]
      size_m: [1.6, 1.2, 1.2]
      shape: "box"

  crane_models:
    - model_id: "urban_flat_top_80m"
      jib_length_m: 80
      counter_jib_length_m: 18
      mast_height_range_m: [55, 85]
      max_load_t: 8
      max_load_radius_m: 18
      tip_load_t: 2.5
      rated_moment_t_m: 270
      slew_speed_max_deg_s: 2.0
      slew_acc_max_deg_s2: 0.8
      trolley_r_min_m: 5
      trolley_r_max_m: 78
      trolley_speed_max_m_s: 0.9
      trolley_acc_max_m_s2: 0.7
      cable_length_min_m: 0.5
      cable_length_max_m: 100
      hoist_speed_max_m_s: 1.2
      hoist_acc_max_m_s2: 0.8
      min_clearance_below_jib_m: 2
      load_chart_points:
        - {radius_m: 18, capacity_t: 8.0}
        - {radius_m: 45, capacity_t: 5.0}
        - {radius_m: 65, capacity_t: 3.4}
        - {radius_m: 80, capacity_t: 2.5}
    - model_id: "elevated_flat_top_100m"
      jib_length_m: 100
      counter_jib_length_m: 22
      mast_height_range_m: [45, 95]
      max_load_t: 8
      max_load_radius_m: 18
      tip_load_t: 2.0
      rated_moment_t_m: 320
      slew_speed_max_deg_s: 2.0
      slew_acc_max_deg_s2: 0.8
      trolley_r_min_m: 3
      trolley_r_max_m: 96
      trolley_speed_max_m_s: 0.9
      trolley_acc_max_m_s2: 0.7
      cable_length_min_m: 0.5
      cable_length_max_m: 125
      hoist_speed_max_m_s: 1.1
      hoist_acc_max_m_s2: 0.8
      min_clearance_below_jib_m: 2
      load_chart_points:
        - {radius_m: 18, capacity_t: 8.0}
        - {radius_m: 50, capacity_t: 4.8}
        - {radius_m: 80, capacity_t: 2.8}
        - {radius_m: 100, capacity_t: 2.0}

  layout:
    mode: "manual"
    num_cranes: 5
    overlap_level: "high"
    height_strategy: "mixed"
    coverage_target: "dense_overlap"
    slew_mode_default: "continuous"
    max_sampling_attempts: 500

  cranes:
    - crane_id: "C1_west_ground"
      model_id: "urban_flat_top_80m"
      base: [-112, 18, 0]
      mast_height_m: 64
      theta_init_deg: -90
      slew:
        mode: "continuous"
    - crane_id: "C2_east_ground"
      model_id: "urban_flat_top_80m"
      base: [108, 8, 0]
      mast_height_m: 78
      theta_init_deg: 120
      slew:
        mode: "continuous"
    - crane_id: "C3_south_ground"
      model_id: "urban_flat_top_80m"
      base: [-8, -104, 0]
      mast_height_m: 66
      theta_init_deg: 0
      slew:
        mode: "continuous"
    - crane_id: "C4_podium_high"
      model_id: "elevated_flat_top_100m"
      base: [4, 0, 28.8]
      mast_height_m: 86
      theta_init_deg: 60
      slew:
        mode: "continuous"
    - crane_id: "C5_north_high_platform"
      model_id: "elevated_flat_top_100m"
      base: [-4, 68, 57.6]
      mast_height_m: 50
      theta_init_deg: 30
      slew:
        mode: "continuous"

  tasks:
    assignment_mode: "per_crane_queue"
    generation_mode: "manual"
    num_tasks_per_crane: 2
    manual_tasks:
      - task_id: "T1_C1_rebar_to_west12"
        crane_id: "C1_west_ground"
        task_type: "easy_task"
        pickup_zone_id: "west_ground_yard"
        dropoff_zone_id: "west_tower_floor_12"
        load_type: "rebar_bundle"
        priority: "medium"
      - task_id: "T2_C1_formwork_to_west12"
        crane_id: "C1_west_ground"
        task_type: "overlap_task"
        pickup_zone_id: "west_ground_yard"
        dropoff_zone_id: "west_tower_floor_12"
        load_type: "formwork_panel"
        priority: "high"
      - task_id: "T1_C2_rebar_to_east18"
        crane_id: "C2_east_ground"
        task_type: "overlap_task"
        pickup_zone_id: "east_ground_yard"
        dropoff_zone_id: "east_tower_floor_18"
        load_type: "rebar_bundle"
        priority: "high"
      - task_id: "T2_C2_mep_to_east18"
        crane_id: "C2_east_ground"
        task_type: "easy_task"
        pickup_zone_id: "east_ground_yard"
        dropoff_zone_id: "east_tower_floor_18"
        load_type: "mep_box"
        priority: "medium"
      - task_id: "T1_C3_formwork_to_south14"
        crane_id: "C3_south_ground"
        task_type: "easy_task"
        pickup_zone_id: "south_truck_bed"
        dropoff_zone_id: "south_tower_floor_14"
        load_type: "formwork_panel"
        priority: "medium"
      - task_id: "T2_C3_formwork_to_south14_priority"
        crane_id: "C3_south_ground"
        task_type: "stress_task"
        pickup_zone_id: "south_truck_bed"
        dropoff_zone_id: "south_tower_floor_14"
        load_type: "formwork_panel"
        priority: "high"
      - task_id: "T1_C4_rebar_to_north20"
        crane_id: "C4_podium_high"
        task_type: "overlap_task"
        pickup_zone_id: "podium_roof_staging"
        dropoff_zone_id: "north_tower_floor_20"
        load_type: "rebar_bundle"
        priority: "high"
      - task_id: "T2_C4_mep_to_east_roof"
        crane_id: "C4_podium_high"
        task_type: "stress_task"
        pickup_zone_id: "podium_roof_staging"
        dropoff_zone_id: "east_tower_roof"
        load_type: "mep_box"
        priority: "high"
      - task_id: "T3_C4_mep_from_truck_to_podium_staging"
        crane_id: "C4_podium_high"
        task_type: "easy_task"
        pickup_zone_id: "south_truck_bed"
        dropoff_zone_id: "podium_roof_staging"
        load_type: "mep_box"
        priority: "medium"
      - task_id: "T1_C5_mep_to_north_roof"
        crane_id: "C5_north_high_platform"
        task_type: "stress_task"
        pickup_zone_id: "north_mid_staging"
        dropoff_zone_id: "north_tower_roof"
        load_type: "mep_box"
        priority: "high"
      - task_id: "T2_C5_rebar_to_north20"
        crane_id: "C5_north_high_platform"
        task_type: "overlap_task"
        pickup_zone_id: "north_mid_staging"
        dropoff_zone_id: "north_tower_floor_20"
        load_type: "rebar_bundle"
        priority: "medium"
      - task_id: "T3_C5_mep_to_north_roof"
        crane_id: "C5_north_high_platform"
        task_type: "easy_task"
        pickup_zone_id: "north_mid_staging"
        dropoff_zone_id: "north_tower_roof"
        load_type: "mep_box"
        priority: "medium"
    queue_policy:
      start_mode: "simultaneous"
      initial_start_jitter_s: [0, 0]
      inter_task_delay_s: [0, 1]
    task_type_distribution:
      easy_task: 1.0
      overlap_task: 0.0
      stress_task: 0.0
    fallback_pickup_z_m: 0.0
    fallback_dropoff_z_range_m: [28.8, 108.0]
    attach_delay_s: [0.5, 1.0]
    release_delay_s: [0.5, 1.0]
    priority_distribution:
      low: 0.0
      medium: 0.5
      high: 0.5
    deadline_policy:
      enabled: true
      deadline_miss_is_task_failure: false
    state_machine:
      align_xy_threshold_m: 2.5
      attach_xy_threshold_m: 1.5
      attach_height_threshold_m: 1.0
      release_xy_threshold_m: 1.8
      release_height_threshold_m: 1.0
      attach_speed_threshold:
        slew_deg_s: 1.0
        trolley_m_s: 0.25
        hoist_m_s: 0.25
      release_speed_threshold:
        slew_deg_s: 1.0
        trolley_m_s: 0.25
        hoist_m_s: 0.25
      safe_transport_height_m: 54.0
      lift_clearance_m: 2.0
      attach_stage_timeout_s: 1200
      release_stage_timeout_s: 1200
      task_no_progress_timeout_s: 1200
      recovery_release_timeout_s: 1200
      stage_timeout_policy:
        fail_current_task: true
        terminate_episode: false
    recovery:
      enabled: true
      policy: "attempt_safe_release"
      emergency_drop_zones: []

  weather:
    mode: "constant"
    wind:
      base_speed_m_s: 3
      gust_speed_m_s: 5
      direction_deg: 90
    visibility:
      base_level: "good"

  risk:
    geometry_envelope:
      jib_radius_m: 0.75
      hook_radius_m: 0.5
      load_radius_m: 1.0
    thresholds_m:
      low: 6.0
      medium: 4.0
      high: 2.5
      near_miss: 1.5
    ttc_threshold_level: "high"
    wind_safe_distance_factor:
      enabled: true
      extra_clearance_per_10m_s_wind_m: 0.5

experiment:
  schema_version: "1.0"
  experiment_id: "curated_complex_cross_lifting"
  scenario_ref: "configs/curated_complex_cross_lifting.yaml"
  seed: 20260621
  sim:
    dt: 0.2
    duration_s: 10800
    min_duration_s: 0
    stop_when_all_tasks_done: true
    completion_cooldown_s: 2
    physics_hz: 5
    controller_hz: 5
    llm_decision_interval_s: 1.0
  risk_prompt_mode: "R1"
  safety_mode: "S1"
  runtime:
    mode: "offline_batch"
    replay_mode: false
    replay_file: null
    llm_cache_enabled: true
  operators:
    assignment_mode: "random"
    profile_distribution:
      normal: 1.0
      conservative: 0.0
      aggressive: 0.0
      novice: 0.0
      fatigued: 0.0
  llm:
    enabled: true
    provider: "deepseek"
    model: "deepseek-v4-flash"
    base_url: "https://api.deepseek.com/v1"
    api_key: null
    temperature: 0.2
    timeout_s: 30
    max_retries: 1
    max_consecutive_failures: 10
    fallback_policy: "neutral_stop"
    command_duration:
      default_s: 1.0
      min_s: 0.5
      max_s: 3.0
    scheduling:
      mode: "offline_wait"
      stale_command_max_hold_s: 0.5
      max_concurrent_requests: 4
    structured_output:
      mode: "json_object"
    context:
      history_mode: "short"
      recent_decisions_full: 8
      include_task_history_summary: true
      include_completed_task_summary: true
      include_failed_request_history: true
      include_risk_event_history: true
      summarizer:
        mode: "none"
        provider: "same_as_operator"
        fallback: "rule"
        trigger:
          every_n_decisions: 20
          context_over_tokens: 12000
  output:
    run_root: "runs/curated-complex-cross-lifting"
    save_visual_frames: true
    save_parquet: true
    save_replay: true
