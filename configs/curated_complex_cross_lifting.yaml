      - zone_id: "east_tower_roof"
        type: "box"
        center: [72, 48, 108.0]
        size: [12, 10, 0.4]
        z_range_m: [108.0, 108.4]
        surface_z_m: 108.0
        floor_id: "roof"
        building_id: "east_tower"
        level_index: 30
