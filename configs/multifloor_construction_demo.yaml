scenario:
  schema_version: "1.0"
  scenario_id: "multifloor_construction_demo"
  seed: 20260618

  site:
    coordinate_system: "ENU"
    boundary:
      x_min: -90
      x_max: 90
      y_min: -90
      y_max: 90
      z_min: 0
      z_max: 70
    buildings:
      - building_id: "tower_a"
        name: "Tower A"
        footprint:
          - [-32, -20]
          - [32, -20]
          - [32, 28]
          - [-32, 28]
        floors: 7
        floor_height_m: 3.6
        base_z_m: 0
    forbidden_zones: []
    material_zones:
      - zone_id: "ground_yard_west"
        type: "box"
        center: [-8, -6, 0.2]
        size: [8, 8, 0.4]
        z_range_m: [0, 0.4]
        surface_z_m: 0
        zone_role: "ground_yard"
        hook_target_offset_m: 0.5
        approach_clearance_m: 3
        load_types: ["rebar_bundle", "formwork"]
      - zone_id: "truck_bed_south"
        type: "box"
        center: [8, -6, 1.4]
        size: [8, 6, 0.4]
        z_range_m: [1.2, 1.6]
        surface_z_m: 1.2
        zone_role: "truck_bed"
        hook_target_offset_m: 0.5
        approach_clearance_m: 3
        load_types: ["rebar_bundle"]
    work_zones:
      - zone_id: "floor_03_east"
        type: "box"
        center: [8, 8, 10.8]
        size: [8, 8, 0.4]
        z_range_m: [10.8, 11.2]
        surface_z_m: 10.8
        floor_id: "floor_03"
        building_id: "tower_a"
        level_index: 3
        zone_role: "floor_slab"
        hook_target_offset_m: 0.5
        approach_clearance_m: 4
        accepted_load_types: ["rebar_bundle", "formwork"]
      - zone_id: "floor_05_core"
        type: "box"
        center: [0, 10, 18.0]
        size: [8, 8, 0.4]
        z_range_m: [18.0, 18.4]
        surface_z_m: 18.0
        floor_id: "floor_05"
        building_id: "tower_a"
        level_index: 5
        zone_role: "unloading_platform"
        hook_target_offset_m: 0.5
        approach_clearance_m: 4
        accepted_load_types: ["rebar_bundle"]
      - zone_id: "roof_north"
        type: "box"
        center: [-8, 12, 25.2]
        size: [8, 8, 0.4]
        z_range_m: [25.2, 25.6]
        surface_z_m: 25.2
        floor_id: "roof"
        building_id: "tower_a"
        level_index: 7
        zone_role: "roof"
        hook_target_offset_m: 0.5
        approach_clearance_m: 4
        accepted_load_types: ["rebar_bundle", "formwork"]
    forbidden_zone_policy:
      mode: "task_only"
      record_violation: true

  load_types:
    rebar_bundle:
      display_name: "Rebar bundle"
      weight_range_t: [1.0, 1.4]
      size_m: [4.0, 0.8, 0.8]
      shape: "box_long"
    formwork:
      display_name: "Formwork panel"
      weight_range_t: [0.6, 1.0]
      size_m: [3.0, 1.2, 0.3]
      shape: "flat_box"

  crane_models:
    - model_id: "demo_flat_top_55m"
      jib_length_m: 55
      counter_jib_length_m: 12
      mast_height_range_m: [30, 44]
      max_load_t: 6
      max_load_radius_m: 15
      tip_load_t: 1.8
      rated_moment_t_m: 95
      slew_speed_max_deg_s: 2.0
      slew_acc_max_deg_s2: 0.8
      trolley_r_min_m: 5
      trolley_r_max_m: 50
      trolley_speed_max_m_s: 0.9
      trolley_acc_max_m_s2: 0.7
      cable_length_min_m: 2
      cable_length_max_m: 60
      hoist_speed_max_m_s: 1.2
      hoist_acc_max_m_s2: 0.8
      min_clearance_below_jib_m: 2

  layout:
    mode: "manual"
    num_cranes: 4
    overlap_level: "medium"
    height_strategy: "mixed"
    coverage_target: "balanced"
    slew_mode_default: "continuous"
    max_sampling_attempts: 500

  cranes:
    - crane_id: "C1"
      model_id: "demo_flat_top_55m"
      base: [-24, -24, 0]
      mast_height_m: 34
      theta_init_deg: -135
      slew:
        mode: "continuous"
    - crane_id: "C2"
      model_id: "demo_flat_top_55m"
      base: [24, -24, 0]
      mast_height_m: 38
      theta_init_deg: -45
      slew:
        mode: "continuous"
    - crane_id: "C3"
      model_id: "demo_flat_top_55m"
      base: [-24, 30, 0]
      mast_height_m: 40
      theta_init_deg: 135
      slew:
        mode: "continuous"
    - crane_id: "C4"
      model_id: "demo_flat_top_55m"
      base: [24, 30, 0]
      mast_height_m: 42
      theta_init_deg: 45
      slew:
        mode: "continuous"

  tasks:
    assignment_mode: "per_crane_queue"
    generation_mode: "manual"
    num_tasks_per_crane: 2
    manual_tasks:
      - task_id: "T_C1_001"
        crane_id: "C1"
        task_type: "easy_task"
        pickup_zone_id: "ground_yard_west"
        dropoff_zone_id: "floor_03_east"
        load_type: "formwork"
        priority: "medium"
      - task_id: "T_C1_002"
        crane_id: "C1"
        task_type: "easy_task"
        pickup_zone_id: "truck_bed_south"
        dropoff_zone_id: "floor_05_core"
        load_type: "rebar_bundle"
        priority: "medium"
      - task_id: "T_C2_001"
        crane_id: "C2"
        task_type: "easy_task"
        pickup_zone_id: "truck_bed_south"
        dropoff_zone_id: "floor_03_east"
        load_type: "rebar_bundle"
        priority: "medium"
      - task_id: "T_C2_002"
        crane_id: "C2"
        task_type: "easy_task"
        pickup_zone_id: "ground_yard_west"
        dropoff_zone_id: "roof_north"
        load_type: "formwork"
        priority: "high"
      - task_id: "T_C3_001"
        crane_id: "C3"
        task_type: "easy_task"
        pickup_zone_id: "ground_yard_west"
        dropoff_zone_id: "floor_05_core"
        load_type: "rebar_bundle"
        priority: "medium"
      - task_id: "T_C3_002"
        crane_id: "C3"
        task_type: "easy_task"
        pickup_zone_id: "truck_bed_south"
        dropoff_zone_id: "roof_north"
        load_type: "rebar_bundle"
        priority: "high"
      - task_id: "T_C4_001"
        crane_id: "C4"
        task_type: "easy_task"
        pickup_zone_id: "truck_bed_south"
        dropoff_zone_id: "floor_05_core"
        load_type: "rebar_bundle"
        priority: "medium"
      - task_id: "T_C4_002"
        crane_id: "C4"
        task_type: "easy_task"
        pickup_zone_id: "ground_yard_west"
        dropoff_zone_id: "roof_north"
        load_type: "formwork"
        priority: "high"
    queue_policy:
      start_mode: "simultaneous"
      initial_start_jitter_s: [0, 0]
      inter_task_delay_s: [0, 1]
    task_type_distribution:
      easy_task: 1.0
      overlap_task: 0.0
      stress_task: 0.0
    fallback_pickup_z_m: 0.0
    fallback_dropoff_z_range_m: [10.8, 25.2]
    attach_delay_s: [0, 0]
    release_delay_s: [0, 0]
    priority_distribution:
      low: 0.0
      medium: 0.75
      high: 0.25
    deadline_policy:
      enabled: true
      deadline_miss_is_task_failure: false
    state_machine:
      align_xy_threshold_m: 2.5
      attach_xy_threshold_m: 1.5
      attach_height_threshold_m: 1.0
      release_xy_threshold_m: 1.8
      release_height_threshold_m: 1.0
      attach_speed_threshold:
        slew_deg_s: 1.0
        trolley_m_s: 0.25
        hoist_m_s: 0.25
      release_speed_threshold:
        slew_deg_s: 1.0
        trolley_m_s: 0.25
        hoist_m_s: 0.25
      safe_transport_height_m: 28.0
      lift_clearance_m: 2.0
      attach_stage_timeout_s: 1200
      release_stage_timeout_s: 1200
      task_no_progress_timeout_s: 1200
      recovery_release_timeout_s: 1200
      stage_timeout_policy:
        fail_current_task: true
        terminate_episode: false
    recovery:
      enabled: true
      policy: "attempt_safe_release"
      emergency_drop_zones: []

  weather:
    mode: "constant"
    wind:
      base_speed_m_s: 3
      gust_speed_m_s: 5
      direction_deg: 90
    visibility:
      base_level: "good"

  risk:
    geometry_envelope:
      jib_radius_m: 0.75
      hook_radius_m: 0.5
      load_radius_m: 1.0
    thresholds_m:
      low: 6.0
      medium: 4.0
      high: 2.5
      near_miss: 1.5
    ttc_threshold_level: "high"
    wind_safe_distance_factor:
      enabled: true
      extra_clearance_per_10m_s_wind_m: 0.5

experiment:
  schema_version: "1.0"
  experiment_id: "multifloor_construction_demo"
  scenario_ref: "configs/multifloor_construction_demo.yaml"
  seed: 20260618
  sim:
    dt: 0.2
    duration_s: 7200
    min_duration_s: 0
    stop_when_all_tasks_done: true
    completion_cooldown_s: 2
    physics_hz: 5
    controller_hz: 5
    llm_decision_interval_s: 1.0
  risk_prompt_mode: "R1"
  safety_mode: "S1"
  runtime:
    mode: "offline_batch"
    replay_mode: false
    replay_file: null
    llm_cache_enabled: true
  operators:
    assignment_mode: "random"
    profile_distribution:
      normal: 1.0
      conservative: 0.0
      aggressive: 0.0
      novice: 0.0
      fatigued: 0.0
  llm:
    enabled: true
    provider: "deepseek"
    model: "deepseek-v4-flash"
    base_url: "https://api.deepseek.com/v1"
    api_key_env: "DEEPSEEK_API_KEY"
    api_key: null
    temperature: 0.2
    timeout_s: 30
    max_retries: 1
    max_consecutive_failures: 10
    fallback_policy: "neutral_stop"
    command_duration:
      default_s: 1.0
      min_s: 0.5
      max_s: 3.0
    scheduling:
      mode: "offline_wait"
      stale_command_max_hold_s: 0.5
      max_concurrent_requests: 4
    structured_output:
      mode: "json_object"
    context:
      history_mode: "short"
      recent_decisions_full: 8
      include_task_history_summary: true
      include_completed_task_summary: true
      include_failed_request_history: true
      include_risk_event_history: true
      summarizer:
        mode: "none"
        provider: "same_as_operator"
        fallback: "rule"
        trigger:
          every_n_decisions: 20
          context_over_tokens: 12000
  output:
    run_root: "runs/multifloor-construction-demo"
    save_visual_frames: true
    save_parquet: true
    save_replay: true
